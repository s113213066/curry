<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>初煦咖哩 truedish curry</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FFFDF7;
    --card: #FFFFFF;
    --ink: #2C2A26;
    --ink-soft: #6B6760;
    --ink-faint: #A8A29A;
    --line: #EFE9DC;
    --line-strong: #E2DBC9;
    --yellow: #F4D77A;
    --yellow-soft: #FBEDB8;
    --yellow-deep: #C9A33A;
    --blue: #A9D4E5;
    --blue-soft: #DCEEF5;
    --shadow: 0 2px 10px rgba(60, 50, 20, 0.04), 0 8px 24px rgba(60, 50, 20, 0.05);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    background: #F4EFE2;
    font-family: "Noto Sans TC", "Noto Sans JP", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }

  .app {
    width: 100%;
    max-width: 375px;
    min-height: 100vh;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
  }

  /* ─── Language Switcher (sticky top) ──────────────────────────────── */
  .lang-bar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 10px 12px;
    background: rgba(255, 253, 247, 0.92);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .lang-btn {
    flex: 1;
    max-width: 78px;
    border: 1px solid var(--line-strong);
    background: transparent;
    color: var(--ink-soft);
    font: 500 12px/1 "Noto Sans TC", -apple-system, sans-serif;
    padding: 8px 4px;
    border-radius: 999px;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
    letter-spacing: 0.02em;
  }
  .lang-btn:hover { background: var(--yellow-soft); }
  .lang-btn.active {
    background: var(--yellow);
    color: var(--ink);
    border-color: var(--yellow-deep);
    font-weight: 700;
  }

  /* ─── Hero / store info ───────────────────────────────────────────── */
  .hero {
    padding: 22px 20px 26px;
    background:
      radial-gradient(120% 80% at 10% 0%, var(--blue-soft) 0%, transparent 55%),
      radial-gradient(140% 90% at 100% 100%, var(--yellow-soft) 0%, transparent 50%),
      var(--bg);
    border-bottom: 1px solid var(--line);
  }
  .brand-art {
    aspect-ratio: 4/3;
    border-radius: 18px;
    background:
      repeating-linear-gradient(
        135deg,
        rgba(244, 215, 122, 0.35) 0 8px,
        rgba(244, 215, 122, 0.18) 8px 16px
      ),
      linear-gradient(180deg, #FBEDB8 0%, #A9D4E5 100%);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
  }
  .brand-art-mark {
    text-align: center;
    color: rgba(44, 42, 38, 0.55);
    font-family: "Cormorant Garamond", "Noto Serif TC", serif;
  }
  .brand-art-mark .glyph {
    font-size: 56px;
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1;
    display: block;
    margin-bottom: 6px;
  }
  .brand-art-mark .sub {
    font: 500 10px/1 ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(44, 42, 38, 0.55);
  }
  .store-name {
    font-family: "Cormorant Garamond", "Noto Serif TC", "Noto Sans TC", serif;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .store-name-sub {
    font: 400 12px/1.3 ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .store-meta {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }
  .meta-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .meta-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    border-radius: 6px;
    background: var(--yellow-soft);
    color: var(--ink);
    display: grid;
    place-items: center;
    font-size: 12px;
  }
  .meta-icon.blue { background: var(--blue-soft); }
  .meta-row a {
    color: var(--ink);
    text-decoration: none;
    font-weight: 500;
  }
  .meta-row .label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 2px;
    font-family: ui-monospace, monospace;
  }

  /* ─── Sticky Category tabs ────────────────────────────────────────── */
  .cat-bar {
    position: sticky;
    top: 47px;
    z-index: 40;
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    background: rgba(255, 253, 247, 0.95);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 999px;
    background: transparent;
    color: var(--ink-soft);
    font: 500 13px/1 "Noto Sans TC", -apple-system, sans-serif;
    border: 1px solid var(--line-strong);
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
  }
  .cat-pill.active {
    background: var(--ink);
    color: var(--yellow);
    border-color: var(--ink);
    font-weight: 700;
  }

  /* ─── Sections ────────────────────────────────────────────────────── */
  .section {
    padding: 28px 20px 8px;
    scroll-margin-top: 100px;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 18px;
  }
  .section-title {
    font-family: "Cormorant Garamond", "Noto Serif TC", serif;
    font-size: 26px;
    font-weight: 600;
    margin: 0;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .section-num {
    font: 500 11px/1 ui-monospace, monospace;
    letter-spacing: 0.16em;
    color: var(--ink-faint);
    flex-shrink: 0;
  }
  .section-rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--yellow) 0%, transparent 100%);
    align-self: center;
  }

  /* ─── Item cards ──────────────────────────────────────────────────── */
  .items { display: flex; flex-direction: column; gap: 12px; }
  .item-card {
    display: flex;
    gap: 14px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s;
    text-align: left;
    width: 100%;
    font-family: inherit;
    color: inherit;
  }
  .item-card:active {
    transform: scale(0.985);
    box-shadow: var(--shadow);
    border-color: var(--yellow);
  }
  .item-thumb {
    width: 72px;
    height: 72px;
    flex-shrink: 0;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--yellow-soft) 0%, var(--blue-soft) 100%);
    display: grid;
    place-items: center;
    font-size: 34px;
    overflow: hidden;
    position: relative;
  }
  .item-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .item-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
  }
  .item-name {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--ink);
    margin: 0;
    word-break: break-word;
  }
  .item-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 7px;
    border-radius: 999px;
    background: var(--yellow-soft);
    font-size: 10px;
    color: var(--ink-soft);
    line-height: 1.4;
    white-space: nowrap;
  }
  .tag-badge .ticon { font-size: 11px; }
  .item-prices {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 2px;
  }
  .price-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    font-size: 13px;
  }
  .price-label {
    color: var(--ink-soft);
  }
  .price-value {
    font-weight: 700;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .price-value .cur {
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-faint);
    margin-right: 2px;
    letter-spacing: 0.05em;
  }
  .price-single .price-value {
    font-size: 15px;
  }

  /* ─── Footer ──────────────────────────────────────────────────────── */
  .footer {
    margin: 24px 16px 32px;
    padding: 18px 18px;
    border: 1px dashed var(--line-strong);
    border-radius: 14px;
    background: rgba(244, 215, 122, 0.08);
  }
  .footer-line {
    display: flex;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.55;
  }
  .footer-line + .footer-line { margin-top: 8px; }
  .footer-dot {
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--yellow-deep);
    margin-top: 7px;
  }
  .footer-brand {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    text-align: center;
    font: 400 10px/1.5 ui-monospace, monospace;
    color: var(--ink-faint);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* ─── Modal ───────────────────────────────────────────────────────── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(20, 18, 14, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-backdrop.open {
    display: flex;
    animation: fadeIn .18s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: 100%;
    max-width: 375px;
    max-height: 92vh;
    background: var(--bg);
    border-radius: 22px 22px 0 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: slideUp .25s cubic-bezier(.2, .9, .3, 1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-grip {
    width: 40px;
    height: 4px;
    background: var(--line-strong);
    border-radius: 4px;
    margin: 8px auto 4px;
    flex-shrink: 0;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--line);
    color: var(--ink);
    display: grid;
    place-items: center;
    cursor: pointer;
    z-index: 5;
    font-size: 16px;
    line-height: 1;
  }
  .modal-image-wrap {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, var(--yellow-soft) 0%, var(--blue-soft) 100%);
    overflow: hidden;
    touch-action: none;
    position: relative;
    flex-shrink: 0;
    display: grid;
    place-items: center;
  }
  .modal-image-wrap .pinch-target {
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    transform-origin: center center;
    transition: transform .15s ease;
    user-select: none;
    font-size: 120px;
  }
  .modal-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .pinch-hint {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font: 500 10px/1 ui-monospace, monospace;
    letter-spacing: 0.16em;
    color: rgba(44, 42, 38, 0.55);
    text-transform: uppercase;
    background: rgba(255, 253, 247, 0.7);
    padding: 5px 9px;
    border-radius: 999px;
    pointer-events: none;
  }
  .modal-body {
    padding: 18px 20px 28px;
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }
  .modal-name {
    font-family: "Cormorant Garamond", "Noto Serif TC", serif;
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 4px;
    line-height: 1.2;
  }
  .modal-id {
    font: 500 10px/1 ui-monospace, monospace;
    color: var(--ink-faint);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 10px 0 14px;
  }
  .modal-tags .tag-badge {
    padding: 4px 10px;
    font-size: 11px;
  }
  .modal-prices {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 12px 0;
    margin: 14px 0;
  }
  .modal-price-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    font-size: 14px;
  }
  .modal-price-line + .modal-price-line {
    border-top: 1px dashed var(--line);
  }
  .modal-price-line .price-value {
    font-size: 17px;
  }
  .modal-section { margin-top: 16px; }
  .modal-section-label {
    font: 500 10px/1 ui-monospace, monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .modal-section-body {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  /* ─── Utility ─────────────────────────────────────────────────────── */
  .hidden { display: none !important; }
  .empty-cat { padding: 24px 20px; color: var(--ink-faint); font-size: 13px; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <!-- ─── Language Switcher ─────────────────────────────────── -->
  <nav class="lang-bar" id="langBar" aria-label="Language">
    <button class="lang-btn active" data-lang="zh">繁中</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="ja">日本語</button>
    <button class="lang-btn" data-lang="ko">한국어</button>
  </nav>

  <!-- ─── Hero ─────────────────────────────────────────────── -->
  <header class="hero">
    <div class="brand-art" role="img" aria-label="initial dish illustration placeholder">
      <div class="brand-art-mark">
        <span class="glyph">初煦 · True</span>
        <span class="sub">curry · since</span>
      </div>
    </div>
    <h1 class="store-name" id="storeName">初煦咖哩</h1>
    <div class="store-name-sub" id="storeNameSub">truedish curry</div>
    <div class="store-meta">
      <div class="meta-row">
        <div class="meta-icon">📍</div>
        <div>
          <div class="label" id="addressLabel">地址</div>
          <a id="addressLink" target="_blank" rel="noopener">545 南投縣埔里鎮信義路 1065 號</a>
        </div>
      </div>
      <div class="meta-row">
        <div class="meta-icon blue">☎</div>
        <div>
          <div class="label" id="phoneLabel">電話</div>
          <a href="tel:049-291-7490" id="phoneLink">049-291-7490</a>
        </div>
      </div>
    </div>
  </header>

  <!-- ─── Category sticky tabs ─────────────────────────────── -->
  <nav class="cat-bar" id="catBar"></nav>

  <!-- ─── Sections ─────────────────────────────────────────── -->
  <main id="sections"></main>

  <!-- ─── Footer ───────────────────────────────────────────── -->
  <footer class="footer">
    <div class="footer-line"><div class="footer-dot"></div><span id="footerNote1"></span></div>
    <div class="footer-line"><div class="footer-dot"></div><span id="footerNote2"></span></div>
    <div class="footer-brand">truedish curry · 初煦 · 2026</div>
  </footer>
</div>

<!-- ─── Modal ──────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <div class="modal-grip"></div>
    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    <div class="modal-image-wrap" id="modalImageWrap">
      <div class="pinch-target" id="pinchTarget"></div>
      <div class="pinch-hint" id="pinchHint">PINCH TO ZOOM</div>
    </div>
    <div class="modal-body">
      <h2 class="modal-name" id="modalName"></h2>
      <div class="modal-id" id="modalId"></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-prices" id="modalPrices"></div>
      <div class="modal-section hidden" id="modalDescBlock">
        <div class="modal-section-label" id="modalDescLabel"></div>
        <div class="modal-section-body" id="modalDescBody"></div>
      </div>
      <div class="modal-section hidden" id="modalNoteBlock">
        <div class="modal-section-label" id="modalNoteLabel"></div>
        <div class="modal-section-body" id="modalNoteBody"></div>
      </div>
    </div>
  </div>
</div>

<script src="menu-items.js"></script>
<script>
(() => {
  // ─── State ─────────────────────────────────────────────────
  let currentLang = 'zh';
  const items = window.menuItems;
  const catLabels = window.categoryLabels;
  const catOrder = window.categoryOrder;
  const tags = window.tagDict;
  const ui = window.uiText;

  // ─── Helpers ───────────────────────────────────────────────
  const $ = (id) => document.getElementById(id);
  const el = (tag, cls, html) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  };
  const priceStr = (v) => v === 'market' ? ui[currentLang].marketPrice
    : `<span class="cur">NT$</span>${v}`;

  // ─── Render category bar ───────────────────────────────────
  function renderCatBar() {
    const bar = $('catBar');
    bar.innerHTML = '';
    catOrder.forEach((cat, i) => {
      const btn = el('button', 'cat-pill' + (i === 0 ? ' active' : ''));
      btn.dataset.cat = cat;
      btn.textContent = catLabels[cat][currentLang];
      btn.addEventListener('click', () => {
        document.getElementById('sec-' + cat)
          .scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      bar.appendChild(btn);
    });
  }

  // ─── Render sections + items ───────────────────────────────
  function renderSections() {
    const root = $('sections');
    root.innerHTML = '';
    catOrder.forEach((cat, i) => {
      const list = items.filter(it => it.category === cat);
      if (!list.length) return;
      const sec = el('section', 'section');
      sec.id = 'sec-' + cat;

      const head = el('div', 'section-head');
      head.appendChild(el('h2', 'section-title', catLabels[cat][currentLang]));
      head.appendChild(el('div', 'section-rule'));
      head.appendChild(el('div', 'section-num',
        String(i + 1).padStart(2, '0') + ' / ' + String(catOrder.length).padStart(2, '0')));
      sec.appendChild(head);

      const itemsEl = el('div', 'items');
      list.forEach(it => itemsEl.appendChild(renderCard(it)));
      sec.appendChild(itemsEl);
      root.appendChild(sec);
    });
  }

  function renderCard(it) {
    const card = el('button', 'item-card' + (it.price.length === 1 ? ' price-single' : ''));
    card.type = 'button';
    card.setAttribute('aria-label', it.names[currentLang]);

    const thumb = el('div', 'item-thumb');
    if (it.image) {
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = it.image;
      img.alt = '';
      thumb.appendChild(img);
    } else {
      thumb.textContent = it.emoji || '🍽';
    }
    card.appendChild(thumb);

    const body = el('div', 'item-body');
    body.appendChild(el('h3', 'item-name', escape(it.names[currentLang])));

    if (it.tags && it.tags.length) {
      const tagsEl = el('div', 'item-tags');
      it.tags.forEach(t => {
        if (!tags[t]) return;
        const b = el('span', 'tag-badge');
        b.innerHTML = `<span class="ticon">${tags[t].icon}</span>${escape(tags[t].labels[currentLang])}`;
        tagsEl.appendChild(b);
      });
      body.appendChild(tagsEl);
    }

    const prices = el('div', 'item-prices');
    it.price.forEach(p => {
      const line = el('div', 'price-line');
      if (p.label) line.appendChild(el('span', 'price-label', escape(p.label[currentLang])));
      else line.appendChild(el('span'));
      line.appendChild(el('span', 'price-value', priceStr(p.value)));
      prices.appendChild(line);
    });
    body.appendChild(prices);
    card.appendChild(body);

    card.addEventListener('click', () => openModal(it));
    return card;
  }

  function escape(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // ─── Modal ─────────────────────────────────────────────────
  let savedScrollY = 0;
  function openModal(it) {
    savedScrollY = window.scrollY;
    const backdrop = $('modalBackdrop');
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';

    $('modalName').textContent = it.names[currentLang];
    $('modalId').textContent = it.id;

    const pt = $('pinchTarget');
    pt.innerHTML = '';
    pt.style.transform = 'scale(1) translate(0,0)';
    if (it.image) {
      const img = document.createElement('img');
      img.src = it.image;
      img.alt = '';
      pt.appendChild(img);
    } else {
      pt.textContent = it.emoji || '🍽';
    }
    $('pinchHint').textContent = ui[currentLang].pinchHint;

    const tagsEl = $('modalTags');
    tagsEl.innerHTML = '';
    (it.tags || []).forEach(t => {
      if (!tags[t]) return;
      const b = el('span', 'tag-badge');
      b.innerHTML = `<span class="ticon">${tags[t].icon}</span>${escape(tags[t].labels[currentLang])}`;
      tagsEl.appendChild(b);
    });
    tagsEl.style.display = it.tags && it.tags.length ? 'flex' : 'none';

    const prices = $('modalPrices');
    prices.innerHTML = '';
    it.price.forEach(p => {
      const line = el('div', 'modal-price-line');
      line.appendChild(el('span', 'price-label',
        p.label ? escape(p.label[currentLang]) : it.names[currentLang]));
      line.appendChild(el('span', 'price-value', priceStr(p.value)));
      prices.appendChild(line);
    });

    const desc = it.desc && it.desc[currentLang];
    if (desc) {
      $('modalDescBlock').classList.remove('hidden');
      $('modalDescLabel').textContent = ui[currentLang].descLabel;
      $('modalDescBody').textContent = desc;
    } else $('modalDescBlock').classList.add('hidden');

    const note = it.note && it.note[currentLang];
    if (note) {
      $('modalNoteBlock').classList.remove('hidden');
      $('modalNoteLabel').textContent = ui[currentLang].noteLabel;
      $('modalNoteBody').textContent = note;
    } else $('modalNoteBlock').classList.add('hidden');
  }

  function closeModal() {
    $('modalBackdrop').classList.remove('open');
    document.body.style.overflow = '';
    window.scrollTo({ top: savedScrollY, behavior: 'instant' });
  }
  $('modalClose').addEventListener('click', closeModal);
  $('modalBackdrop').addEventListener('click', (e) => {
    if (e.target === $('modalBackdrop')) closeModal();
  });

  // ─── Pinch to zoom on modal image ─────────────────────────
  (() => {
    const wrap = $('modalImageWrap');
    const target = $('pinchTarget');
    let scale = 1, lastDist = 0;
    let panX = 0, panY = 0, panStartX = 0, panStartY = 0, lastPanX = 0, lastPanY = 0;

    const apply = () => {
      target.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    };

    wrap.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastDist = Math.hypot(dx, dy);
      } else if (e.touches.length === 1 && scale > 1) {
        panStartX = e.touches[0].clientX;
        panStartY = e.touches[0].clientY;
        lastPanX = panX;
        lastPanY = panY;
      }
    }, { passive: true });

    wrap.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const d = Math.hypot(dx, dy);
        if (lastDist) {
          scale = Math.max(1, Math.min(4, scale * (d / lastDist)));
          if (scale === 1) { panX = 0; panY = 0; }
          apply();
        }
        lastDist = d;
      } else if (e.touches.length === 1 && scale > 1) {
        e.preventDefault();
        panX = lastPanX + (e.touches[0].clientX - panStartX);
        panY = lastPanY + (e.touches[0].clientY - panStartY);
        apply();
      }
    }, { passive: false });

    wrap.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) lastDist = 0;
    });

    // double-tap to reset
    let lastTap = 0;
    wrap.addEventListener('touchend', () => {
      const now = Date.now();
      if (now - lastTap < 280) {
        scale = 1; panX = 0; panY = 0; apply();
      }
      lastTap = now;
    });
  })();

  // ─── Active section detection (cat bar highlight) ─────────
  function setupScrollSpy() {
    const opts = { rootMargin: '-120px 0px -55% 0px', threshold: 0 };
    const obs = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          const cat = en.target.id.replace('sec-', '');
          document.querySelectorAll('.cat-pill').forEach(p => {
            p.classList.toggle('active', p.dataset.cat === cat);
          });
        }
      });
    }, opts);
    document.querySelectorAll('.section').forEach(s => obs.observe(s));
  }

  // ─── Lang switching ────────────────────────────────────────
  function applyLang() {
    const t = ui[currentLang];
    document.documentElement.lang =
      ({zh:'zh-Hant',en:'en',ja:'ja',ko:'ko'})[currentLang];
    $('storeName').textContent = t.storeName;
    $('storeNameSub').textContent = t.storeNameSub;
    $('addressLabel').textContent = t.addressLabel;
    $('addressLink').textContent = t.address;
    $('addressLink').href =
      'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(t.address);
    $('phoneLabel').textContent = t.phoneLabel;
    $('phoneLink').textContent = t.phone;
    $('phoneLink').href = 'tel:' + t.phone.replace(/\s+/g, '');
    $('footerNote1').textContent = t.footerNote1;
    $('footerNote2').textContent = t.footerNote2;
    renderCatBar();
    renderSections();
    setupScrollSpy();
  }

  $('langBar').addEventListener('click', (e) => {
    const btn = e.target.closest('.lang-btn');
    if (!btn) return;
    document.querySelectorAll('.lang-btn').forEach(b =>
      b.classList.toggle('active', b === btn));
    currentLang = btn.dataset.lang;
    applyLang();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // ─── Init ──────────────────────────────────────────────────
  applyLang();
})();
</script>
</body>
</html>
